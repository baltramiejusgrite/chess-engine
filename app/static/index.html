<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Engine</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    :root {
      --bg: #0c0c0c;
      --panel: #1a1a1a;
      --panel-hover: #242424;
      --border: #2a2a2a;
      --accent: #d4b483;
      --accent-dim: #c9a876;
      --text: #e8e8e8;
      --text-muted: #888;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 20px 0;
      letter-spacing: -0.5px;
      height: 34px;
    }
    h1 .accent { color: var(--accent); font-style: italic; }
    #board { width: 640px; }
    .left-col { display: flex; flex-direction: column; }
    .right-col {
      display: flex;
      flex-direction: column;
      /* push panel down to align with the board top (title height + its margin) */
      padding-top: 54px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 300px;
      height: 640px;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .panel-label {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .live-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .live-indicator.active { display: inline-flex; }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: livePulse 1.6s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.8); }
    }
    .sound-toggle {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      padding: 0;
    }
    .sound-toggle:hover { background: var(--panel-hover); color: var(--text); }
    .sound-toggle.on { color: var(--accent); border-color: var(--accent); }
    .color-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .color-btn {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .color-btn:hover { background: var(--panel-hover); }
    .color-btn.selected {
      border-color: var(--accent);
      color: var(--accent);
    }
    .opponent-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .opponent-card:hover { background: var(--panel-hover); }
    .opponent-card.selected { border-color: var(--accent); }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 6px;
      background: var(--panel-hover);
      border: 1px solid var(--border);
      flex-shrink: 0;
      object-fit: cover;
    }
    .opponent-info { flex: 1; }
    .opponent-name { font-size: 14px; font-weight: 600; }
    .opponent-elo { font-size: 12px; color: var(--text-muted); }
    .new-game-btn {
      width: 100%;
      background: var(--accent);
      color: #0c0c0c;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: auto;
      transition: transform 0.08s ease, background 0.15s ease;
    }
    .new-game-btn:hover { background: var(--accent-dim); }
    .new-game-btn:active { transform: scale(0.96); }
    .new-game-btn.pressed { animation: btnPulse 0.3s ease; }
    @keyframes btnPulse {
      0% { transform: scale(1); }
      40% { transform: scale(0.94); }
      100% { transform: scale(1); }
    }
    .how-to-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
      transition: color 0.15s;
    }
    .how-to-link:hover { color: var(--accent); }
    #status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      min-height: 20px;
    }
    .highlight-move {
      background-image: radial-gradient(circle, rgba(20,20,20,0.32) 18%, transparent 19%) !important;
    }
    .highlight-capture {
      background-image: radial-gradient(circle, transparent 78%, rgba(20,20,20,0.32) 79%) !important;
    }
    .highlight-check {
      background: radial-gradient(circle, rgba(220,60,60,0.9) 35%, rgba(220,60,60,0.45) 72%) !important;
    }
    .highlight-selected {
      box-shadow: inset 0 0 0 4px rgba(212,180,131,0.85) !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-col">
      <h1>Chess <span class="accent">Engine</span></h1>
      <div id="board"></div>
      <div id="status">Pick a side and opponent, then click Start Game.</div>
    </div>

    <div class="right-col">
      <div class="panel">
        <div class="panel-header">
          <p class="panel-label">Play as</p>
          <div class="header-right">
            <span id="liveIndicator" class="live-indicator"><span class="live-dot"></span>Live</span>
            <button id="soundToggle" class="sound-toggle on" onclick="toggleSound()" title="Toggle sound">&#128266;</button>
          </div>
        </div>
        <div class="color-row">
          <button class="color-btn selected" data-color="white" onclick="selectColor('white')">White</button>
          <button class="color-btn" data-color="black" onclick="selectColor('black')">Black</button>
          <button class="color-btn" data-color="random" onclick="selectColor('random')">Random</button>
        </div>

        <p class="panel-label" style="margin-bottom:12px;">Opponent</p>
        <div id="opponents"></div>

        <button id="newGameBtn" class="new-game-btn" onclick="newGame()">Start Game</button>
        <a class="how-to-link" href="https://www.chess.com/learn-how-to-play-chess" target="_blank" rel="noopener">New to chess? Learn how to play &rarr;</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script>
    let soundOn = true;

    const SOUNDS = {
      move:      new Audio('/static/sounds/piece_move.mp3'),
      capture:   new Audio('/static/sounds/capture.mp3'),
      check:     new Audio('/static/sounds/check.mp3'),
      castle:    new Audio('/static/sounds/castle.mp3'),
      gameStart: new Audio('/static/sounds/game_start.mp3'),
      gameEnd:   new Audio('/static/sounds/game_end.mp3'),
    };
    Object.values(SOUNDS).forEach(a => { a.preload = 'auto'; a.load(); });

    function toggleSound() {
      soundOn = !soundOn;
      const btn = document.getElementById('soundToggle');
      btn.classList.toggle('on', soundOn);
      btn.innerHTML = soundOn ? '&#128266;' : '&#128263;';
    }

    function playSound(name) {
      if (!soundOn) return;
      const a = SOUNDS[name];
      if (!a) return;
      try { a.currentTime = 0; a.play().catch(() => {}); } catch (e) {}
    }

    function playMoveSound(moveObj) {
      if (game.in_check()) { playSound('check'); return; }
      if (moveObj && (moveObj.flags.includes('k') || moveObj.flags.includes('q'))) { playSound('castle'); return; }
      if (moveObj && (moveObj.flags.includes('c') || moveObj.flags.includes('e'))) { playSound('capture'); return; }
      playSound('move');
    }

    const OPPONENTS = [
      { id: "my_engine_1",   name: "My Engine \u00b7 Lvl 1",  elo: "300-500",          icon: "baltra_chess_engine_logo.jpg" },
      { id: "my_engine_2",   name: "My Engine \u00b7 Lvl 2",  elo: "500-800",         icon: "baltra_chess_engine_logo.jpg" },
      { id: "my_engine_3",   name: "My Engine \u00b7 Lvl 3",  elo: "~1200",         icon: "baltra_chess_engine_logo.jpg" },
      { id: "stockfish_4",   name: "Stockfish Lite",          elo: "~2000",         icon: "stockfish_logo.jpg" },
      { id: "magnus",        name: "Magnus Carlsen (Stockfish)",          elo: "~2850",         icon: "magnus_carlsen_image.png" },
      { id: "stockfish_6",   name: "Stockfish Max",           elo: "3000+", icon: "stockfish_logo.jpg" },
    ];

    let game = new Chess();
    let board = null;
    let selectedColor = "white";
    let selectedOpponent = "my_engine_3";
    let playerColor = "white";
    let selectedSquare = null;
    let gameActive = false;

    const oppContainer = document.getElementById("opponents");
    OPPONENTS.forEach((opp, i) => {
      const card = document.createElement("div");
      card.className = "opponent-card" + (i === 2 ? " selected" : "");
      card.dataset.id = opp.id;
      card.innerHTML =
        '<img class="avatar" src="/static/images/' + opp.icon + '" alt="">' +
        '<div class="opponent-info">' +
          '<div class="opponent-name">' + opp.name + '</div>' +
          '<div class="opponent-elo">' + opp.elo + '</div>' +
        '</div>';
      card.onclick = () => selectOpponent(opp.id, card);
      oppContainer.appendChild(card);
    });

    function selectColor(color) {
      selectedColor = color;
      document.querySelectorAll(".color-btn").forEach(b => {
        b.classList.toggle("selected", b.dataset.color === color);
      });
    }

    function selectOpponent(id, card) {
      selectedOpponent = id;
      document.querySelectorAll(".opponent-card").forEach(c => {
        c.classList.toggle("selected", c === card);
      });
    }

    function setStatus(text) {
      document.getElementById("status").textContent = text;
    }

    function setGameActive(active) {
      gameActive = active;
      document.getElementById('liveIndicator').classList.toggle('active', active);
      document.getElementById('newGameBtn').textContent = active ? 'Reset Game' : 'Start Game';
    }

    function playerIsWhite() { return playerColor === "white"; }

    function squareEl(square) {
      return $('#board .square-' + square);
    }

    function clearMoveHighlights() {
      $('#board .square-55d63').removeClass('highlight-move highlight-capture highlight-selected');
    }

    function highlightLegalMoves(source) {
      const moves = game.moves({ square: source, verbose: true });
      moves.forEach(m => {
        if (m.flags.includes('c') || m.flags.includes('e')) {
          squareEl(m.to).addClass('highlight-capture');
        } else {
          squareEl(m.to).addClass('highlight-move');
        }
      });
    }

    function clearCheckHighlight() {
      $('#board .square-55d63').removeClass('highlight-check');
    }

    function updateCheckHighlight() {
      clearCheckHighlight();
      if (game.in_check()) {
        const turn = game.turn();
        const boardState = game.board();
        for (let r = 0; r < 8; r++) {
          for (let c = 0; c < 8; c++) {
            const piece = boardState[r][c];
            if (piece && piece.type === 'k' && piece.color === turn) {
              const file = "abcdefgh"[c];
              const rank = 8 - r;
              squareEl(file + rank).addClass('highlight-check');
            }
          }
        }
      }
    }

    function isMyPieceAt(square) {
      const piece = game.get(square);
      if (!piece) return false;
      return (piece.color === 'w') === playerIsWhite();
    }

    function myTurn() {
      if (game.game_over()) return false;
      return (game.turn() === 'w') === playerIsWhite();
    }

    function applyHumanMove(from, to) {
      const move = game.move({ from: from, to: to, promotion: 'q' });
      if (move === null) return false;
      board.position(game.fen());
      updateCheckHighlight();
      playMoveSound(move);
      if (game.game_over()) {
        playSound('gameEnd');
        setGameActive(false);
        setStatus("Game over: " + gameResult());
      } else {
        setStatus("Opponent thinking...");
        window.setTimeout(requestEngineMove, 250);
      }
      return true;
    }

    function onDragStart(source, piece) {
      clearSelection();
      if (game.game_over()) return false;
      if (piece.search(new RegExp("^" + (playerIsWhite() ? "b" : "w"))) !== -1) return false;
      if (!myTurn()) return false;
      highlightLegalMoves(source);
    }

    function onDrop(source, target) {
      clearMoveHighlights();
      const move = game.move({ from: source, to: target, promotion: "q" });
      if (move === null) return "snapback";
      board.position(game.fen());
      updateCheckHighlight();
      playMoveSound(move);
      if (game.game_over()) { playSound('gameEnd'); setGameActive(false); setStatus("Game over: " + gameResult()); return; }
      setStatus("Opponent thinking...");
      window.setTimeout(requestEngineMove, 250);
    }

    function onSnapEnd() {
      clearMoveHighlights();
    }

    function clearSelection() {
      selectedSquare = null;
      clearMoveHighlights();
    }

    function selectSquareForClick(square) {
      selectedSquare = square;
      clearMoveHighlights();
      squareEl(square).addClass('highlight-selected');
      highlightLegalMoves(square);
    }

    function onSquareClick(square) {
      if (!myTurn()) return;
      if (selectedSquare) {
        if (square === selectedSquare) { clearSelection(); return; }
        if (isMyPieceAt(square)) { selectSquareForClick(square); return; }
        applyHumanMove(selectedSquare, square);
        clearSelection();
        return;
      }
      if (isMyPieceAt(square)) {
        selectSquareForClick(square);
      }
    }

    async function requestEngineMove() {
      try {
        const res = await fetch("/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fen: game.fen(), difficulty: selectedOpponent })
        });
        const data = await res.json();

        if (data.game_over && !data.move) {
          board.position(game.fen());
          updateCheckHighlight();
          playSound('gameEnd');
          setGameActive(false);
          setStatus("Game over: " + (data.result || gameResult()));
          return;
        }

        const move = game.move(data.move, { sloppy: true });
        board.position(game.fen());
        updateCheckHighlight();
        playMoveSound(move);

        if (game.game_over()) {
          playSound('gameEnd');
          setGameActive(false);
          setStatus("Game over: " + gameResult());
        } else {
          setStatus("Your move.");
        }
      } catch (err) {
        setStatus("Error: " + err);
      }
    }

    function gameResult() {
      if (game.in_checkmate()) return (game.turn() === "w" ? "Black wins" : "White wins");
      if (game.in_draw()) return "Draw";
      return "Game over";
    }

    function newGame() {
      // press animation
      const btn = document.getElementById('newGameBtn');
      btn.classList.remove('pressed');
      void btn.offsetWidth; // reflow so the animation can re-trigger
      btn.classList.add('pressed');

      game = new Chess();
      clearSelection();
      playerColor = selectedColor;
      if (selectedColor === "random") {
        playerColor = Math.random() < 0.5 ? "white" : "black";
      }
      board.orientation(playerColor);
      board.start();
      clearMoveHighlights();
      clearCheckHighlight();
      playSound('gameStart');
      setGameActive(true);
      setStatus("Your move.");
      attachSquareClicks();
      if (!playerIsWhite()) {
        setStatus("Opponent thinking...");
        window.setTimeout(requestEngineMove, 400);
      }
    }

    function attachSquareClicks() {
      $('#board .square-55d63').off('click.ctm').on('click.ctm', function () {
        const square = $(this).attr('data-square');
        if (square) onSquareClick(square);
      });
    }

    board = Chessboard("board", {
      draggable: true,
      position: "start",
      pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png",
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd
    });

    attachSquareClicks();
  </script>
</body>
</html>
