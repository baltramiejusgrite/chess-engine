<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Engine</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d0b1a;
      color: #e8e8f0;
      max-width: 560px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    h1 { color: #a78bfa; }
    #board { width: 480px; margin: 20px auto; }
    #status {
      margin-top: 16px;
      font-size: 18px;
      min-height: 24px;
    }
    button {
      background: #a78bfa;
      color: #0d0b1a;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Chess Engine</h1>
  <p>You play White. Drag a piece to move.</p>
  <div id="board"></div>
  <div id="status">Your move.</div>
  <button onclick="resetGame()">New game</button>

  <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script>
    const game = new Chess();
    let board = null;

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    // Only allow picking up White pieces, and only when it's White's turn
    function onDragStart(source, piece) {
      if (game.game_over()) return false;
      if (piece.search(/^b/) !== -1) return false;       // can't move black pieces
      if (game.turn() !== 'w') return false;             // only on white's turn
    }

    function onDrop(source, target) {
      const move = game.move({ from: source, to: target, promotion: 'q' });

      if (move === null) return 'snapback';   // illegal move -> snap piece back

      setStatus("Engine thinking...");
      board.position(game.fen());

      if (game.game_over()) {
        setStatus("Game over: " + gameResult());
        return;
      }

      // Ask the engine for its reply
      window.setTimeout(requestEngineMove, 250);
    }

    async function requestEngineMove() {
      try {
        const res = await fetch('/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fen: game.fen() })
        });
        const data = await res.json();

        if (data.game_over) {
          board.position(game.fen());
          setStatus("Game over: " + (data.result || gameResult()));
          return;
        }

        // Apply the engine's move to our local game and the board
        game.move(data.move, { sloppy: true });
        board.position(game.fen());

        if (game.game_over()) {
          setStatus("Game over: " + gameResult());
        } else {
          setStatus("Your move.");
        }
      } catch (err) {
        setStatus("Error talking to engine: " + err);
      }
    }

    function gameResult() {
      if (game.in_checkmate()) return (game.turn() === 'w' ? "Black wins" : "White wins");
      if (game.in_draw()) return "Draw";
      return "Game over";
    }

    function resetGame() {
      game.reset();
      board.start();
      setStatus("Your move.");
    }

    board = Chessboard('board', {
      draggable: true,
      position: 'start',
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
      onDragStart: onDragStart,
      onDrop: onDrop
    });
  </script>
</body>
</html>
